<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Guestbook</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrap">
    <header>
      <h1>Guestbook</h1>
      <p class="intro">Leave a note for whoever stops by. Newest messages show up first.</p>
    </header>

    <form id="entry-form" autocomplete="off">
      <div class="field">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" maxlength="80" placeholder="Your name" required />
      </div>
      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="3" maxlength="500" placeholder="Say hello..." required></textarea>
      </div>
      <div id="error" class="error" role="alert" aria-live="polite"></div>
      <button id="submit" type="submit">Sign the guestbook</button>
    </form>

    <section aria-label="Messages">
      <ul id="messages" class="messages"></ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
